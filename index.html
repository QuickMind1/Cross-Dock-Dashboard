<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Dock Dashboard - Inicio de Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'hsl(220 20% 97%)',
              primary: 'hsl(32 95% 52%)',
              card: 'hsl(0 0% 100%)',
              border: 'hsl(220 13% 88%)'
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background flex items-center justify-center h-screen font-sans">
    
    <div class="bg-card border border-border p-8 rounded-xl shadow-md w-full max-w-md">
        <img src="image_sources/cross_dock_logo.jpg"><br>

        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Qué gusto volver a verte</h2>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="mt-1 block w-full px-3 py-2 border border-border rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary" required>
            </div>
            <div class="flex items-center justify-center">
                <a href="#" id="forgotPasswordBtn" class="text-sm text-primary hover:underline">¿No recuerdas la contraseña?</a>
            </div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-white bg-primary hover:opacity-90 font-medium">
                Iniciar Sesión
            </button>
            <p id="errorMessage" class="text-red-500 text-sm text-center hidden"></p>
            <p id="successMessage" class="text-green-600 text-sm text-center hidden"></p>
        </form>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
